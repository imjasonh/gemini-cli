[package]
name = "gemini-cli-landlock"
version = "0.30.0"
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/google-gemini/gemini-cli"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = "2"
napi-derive = "2"
libc = "0.2"

[target.'cfg(target_os = "linux")'.dependencies]
landlock = "0.4"

[build-dependencies]
napi-build = "2"

[profile.release]
lto = true
strip = true
