name: 'Testing: Sandbox Modes'

on:
  push:
    branches:
      - 'main'
      - 'release/*'
  pull_request:
    branches:
      - 'main'
  workflow_dispatch:

concurrency:
  group: '${{ github.workflow }}-${{ github.head_ref || github.ref }}'
  cancel-in-progress: true

permissions:
  contents: 'read'

jobs:
  test-sandbox:
    name: 'Sandbox (${{ matrix.sandbox }})'
    runs-on: '${{ matrix.os }}'
    continue-on-error: ${{ matrix.allow_failure }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - sandbox: 'bwrap'
            os: 'ubuntu-latest'
            allow_failure: false
          - sandbox: 'landlock'
            os: 'ubuntu-latest'
            allow_failure: false
          - sandbox: 'sandbox-exec'
            os: 'macos-latest'
            allow_failure: true
          - sandbox: 'macos-container'
            os: 'macos-15'
            allow_failure: true

    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955' # ratchet:actions/checkout@v5

      - name: 'Set up Node.js 20.x'
        uses: 'actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020' # ratchet:actions-node@v4
        with:
          node-version: '20.x'

      - name: 'Install bubblewrap'
        if: "matrix.sandbox == 'bwrap'"
        run: 'sudo apt-get install -y bubblewrap'

      - name: 'Build landlock-helper'
        if: "matrix.sandbox == 'landlock'"
        run: |
          cd packages/cli/native
          make
          sudo install -m 755 landlock-helper /usr/local/bin/landlock-helper

      - name: 'Install dependencies'
        run: 'npm ci'

      - name: 'Build project'
        run: 'npm run build'

      - name: 'Run sandbox unit tests (Linux)'
        if: "runner.os == 'Linux'"
        run: |
          npx vitest run \
            packages/cli/src/utils/sandbox.test.ts \
            packages/cli/src/utils/sandboxUtils.test.ts \
            packages/cli/src/utils/bwrapProfiles.test.ts \
            packages/cli/src/utils/bwrap-seccomp.test.ts \
            packages/cli/src/utils/landlockProfiles.test.ts

      - name: 'Run sandbox unit tests (macOS)'
        if: "runner.os == 'macOS' && matrix.sandbox != 'macos-container'"
        run: |
          npx vitest run \
            packages/cli/src/utils/sandbox.test.ts \
            packages/cli/src/utils/sandboxUtils.test.ts

      - name: 'Run integration tests'
        if: "github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)"
        env:
          GEMINI_API_KEY: '${{ secrets.GEMINI_API_KEY }}'
          KEEP_OUTPUT: 'true'
          VERBOSE: 'true'
        run: 'npm run test:integration:sandbox:${{ matrix.sandbox }}'

  sandbox-summary:
    name: 'Sandbox Tests Summary'
    if: 'always()'
    needs: 'test-sandbox'
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Check results'
        run: |
          if [[ "${{ needs.test-sandbox.result }}" != "success" ]]; then
            echo "One or more required sandbox tests failed."
            exit 1
          fi
          echo "All required sandbox tests passed."
